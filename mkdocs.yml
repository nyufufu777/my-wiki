site_name: my-wiki
site_description: 技術資料
site_url: https://nyufufu777.github.io/my-wiki/

theme:
  name: material
  language: ja
  features:
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え

extra_css:
  - stylesheets/extra.css
  - stylesheets/glossary-tooltips.css
  - stylesheets/glossary-positioning.css

extra_javascript:
  - javascripts/mobile-navigation.js
  - javascripts/glossary-tooltips.js
  - javascripts/glossary-first-occurrence.js
  - javascripts/glossary-positioning.js

plugins:
  - search:
      lang: ja

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - はじめに:
      - 用語集: glossary.md
  - システムとネットワーク:
      - API:
          - APIの種類と認証：目的に合わせて選ぶ: api-types.md
          - 入門：使う側から設計する側まで: api.md
          - 内部：DNSからカーネルまで: api-internals.md
      - Sandbox:
          - 入門：隔離・権限・調査の出発点: sandbox.md
          - 内部：OSが境界を作る仕組み: sandbox-internals.md
          - ネームスペース：プロセスごとに見える世界を分ける: namespaces.md
          - 構築：LinuxでSandbox環境を組み立てる: sandbox-build.md
  - Codex:
      - Codexのsandboxと承認: codex-sandbox.md
  - ソフトウェア設計:
      - SDK:
          - SDK入門：APIを使いやすくする部品群: sdk.md
          - Agent SDK入門：自律的な処理を組み立てる: agent-sdk.md
      - エージェント開発:
          - LangGraph：状態を持つワークフローを実装する: langgraph.md
