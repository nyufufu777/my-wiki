site_name: my-wiki
site_description: 技術資料
site_url: https://nyufufu777.github.io/my-wiki/

theme:
  name: material
  language: ja
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: ja

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - システムとネットワーク:
      - API入門：使う側から設計する側まで: api.md
      - APIの内部：DNSからカーネルまで: api-internals.md
      - Sandbox入門：隔離・権限・調査の出発点: sandbox.md
      - Sandboxの内部：OSが境界を作る仕組み: sandbox-internals.md
  - Codex:
      - Codexのsandboxと承認: codex-sandbox.md
